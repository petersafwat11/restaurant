name: build-and-push

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build:
    name: build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
            image: restaurant-api
          - app: web
            dockerfile: apps/web/Dockerfile
            image: restaurant-web
          - app: admin
            dockerfile: apps/admin/Dockerfile
            image: restaurant-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}"
          echo "tags=${REPO}:latest,${REPO}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      # Build args for web/admin so the production API URL is baked into the
      # Next.js bundle (NEXT_PUBLIC_* is inlined at build time). PROD_DOMAIN
      # comes from the repo secret set during deployment.
      - name: Compute next.js build args
        id: nextargs
        run: |
          DOMAIN="${{ secrets.PROD_DOMAIN }}"
          if [ -z "$DOMAIN" ]; then
            echo "build_args=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "build_args<<EOF"
              echo "APP_URL_API=https://api.${DOMAIN}"
              echo "NEXT_PUBLIC_API_URL=https://api.${DOMAIN}/api/v1"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ steps.nextargs.outputs.build_args }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          provenance: false
