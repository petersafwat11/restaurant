name: deploy

on:
  workflow_run:
    workflows: [build-and-push]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234 or latest)"
        required: false
        default: latest

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            echo "tag=sha-$(echo "$SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync compose + Caddyfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy/docker-compose.prod.yml,deploy/Caddyfile,deploy/scripts/backup-db.sh"
          target: "/opt/restaurant"
          strip_components: 1
          overwrite: true

      - name: Pull, migrate, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: TAG
          script: |
            set -euo pipefail
            cd /opt/restaurant

            # Move the compose file to the canonical path Compose looks for.
            if [[ -f docker-compose.prod.yml ]]; then
              mv -f docker-compose.prod.yml docker-compose.yml
            fi
            chmod +x scripts/backup-db.sh

            export IMAGE_TAG="${{ steps.tag.outputs.tag }}"

            echo "==> Pulling images @ $IMAGE_TAG"
            docker compose pull api web admin

            echo "==> Ensuring infra is up"
            docker compose up -d postgres redis caddy

            echo "==> Running migrations"
            # The api image runs as a non-root user that can't write to /app
            # for pnpm/npx caches, so call the bundled prisma binary directly
            # from packages/db/node_modules.
            docker compose run --rm --entrypoint "" \
              -w /app/packages/db \
              api node_modules/.bin/prisma migrate deploy

            echo "==> Rolling restart of app containers"
            docker compose up -d --no-deps api web admin

            echo "==> Pruning dangling images"
            docker image prune -f

      - name: Smoke test
        run: |
          set -euo pipefail
          DOMAIN="${{ secrets.PROD_DOMAIN }}"
          if [[ -z "$DOMAIN" ]]; then
            echo "PROD_DOMAIN secret not set — skipping smoke test"; exit 0
          fi
          # web/admin /healthz is intercepted by next-intl middleware, so
          # the only universal probe is /. The API exposes /api/v1/healthz.
          declare -A probes=(
            ["$DOMAIN"]="/"
            ["admin.$DOMAIN"]="/"
            ["api.$DOMAIN"]="/api/v1/healthz"
          )
          for host in "${!probes[@]}"; do
            url="https://$host${probes[$host]}"
            echo "→ checking $url"
            for i in 1 2 3 4 5; do
              if curl -fsS "$url" -o /dev/null; then
                echo "   ok"; break
              fi
              if [[ $i -eq 5 ]]; then
                echo "   FAIL after 5 attempts"; exit 1
              fi
              sleep 5
            done
          done
